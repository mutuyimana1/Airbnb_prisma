<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airbnb - Welcome</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: white;
      color: black;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #FF5A5F;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #FF5A5F;
    }

    /* HERO SECTION */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(
        rgba(0,0,0,0.5),
        rgba(0,0,0,0.5)
      ),
      url('https://images.unsplash.com/photo-1505691938895-1758d7feb511') no-repeat center/cover;
      color: white;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    /* SEARCH BOX */
    .search-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 700px;
      width: 100%;
    }

    .search-box input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
    }

    .search-box button {
      background: #FF5A5F;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .search-box button:hover {
      background: black;
    }

    /* CTA BUTTON */
    .cta {
      margin-top: 20px;
    }

    .cta button {
      padding: 12px 25px;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .cta button:hover {
      background: #FF5A5F;
      border-color: #FF5A5F;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .navbar {
        padding: 15px 20px;
      }

      .nav-links {
        display: none;
      }

      .hero h1 {
        font-size: 32px;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box input,
      .search-box button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

</body>
</html>
